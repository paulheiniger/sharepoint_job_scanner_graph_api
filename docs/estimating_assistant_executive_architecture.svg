  <path class="arrow" d="M320 319 H780"/>
  <path class="arrow" d="M320 416 H780"/>
  <path class="arrow" d="M320 513 H410"/>
  <path class="arrow" d="M320 610 H410"/>
  <path class="arrow" d="M550 259 V282"/>
  <path class="arrow" d="M550 356 V379"/>
  <path class="arrow" d="M550 453 V476"/>
  <path class="arrow" d="M550 550 V573"/>
  <path class="arrow" d="M550 647 V670"/>
  <path class="arrow" d="M690 416 H780"/>
  <path class="arrow" d="M690 513 H780"/>
  <path class="arrow" d="M690 610 H780"/>
  <path class="arrow" d="M690 707 H780"/>
  <path class="arrow" d="M935 259 V282"/>
  <path class="arrow" d="M935 356 V379"/>
  <path class="arrow" d="M935 453 V476"/>
  <path class="arrow" d="M935 550 V573"/>
  <path class="arrow" d="M935 647 V670"/>
  <path class="arrow" d="M1090 707 H1180 V222"/>
  <path class="arrow" d="M1090 610 H1180 V319"/>
  <path class="arrow" d="M1090 513 H1180 V416"/>
  <path class="arrow" d="M1090 790 H1180 V513"/>
  <path class="softArrow" d="M1305 647 C1305 850 550 870 550 744"/>

  <rect x="60" y="855" width="1380" height="50" fill="#f8fafc" stroke="#d5dce5" rx="12" ry="12"/>
  <text x="82" y="884" class="small">Executive takeaway: the platform captures Spray-Tec institutional knowledge, helps estimators make evidence-backed workbook decisions, keeps Excel as the calculation authority, and turns approved corrections into reusable learning.</text>
</svg>
